# 20B-G short SFT — 250 steps agent/code (after iter5)
stage: stage0_2b_sft
model:
  name: nullxes-latex-2b
  architecture: nhat_dense
  n_layers: 24
  d_model: 2048
  n_heads: 16
  n_kv_heads: 4
  d_head: 128
  d_ff: 7168
  vocab_size: 131072
  max_seq_len: 4096
  rope_theta: 500000.0
  rope_scaling:
    enabled: true
    target_context: 16384
  norm: rmsnorm
  activation: swiglu
  attention: gqa
  hybrid_attention:
    enabled: true
    local_window: 2048
    full_every: 4
    local_rope: true
    global_nope: true
    pattern:
      local_layers: 3
      global_layer: 1
  depth_nope_ratio: 0.25
  tie_embeddings: false
  qk_norm: true
  z_loss_coeff: 1.0e-5
  no_bias: true

tokenizer:
  name: nullxes-latex-v0.3
  vocab_size: 131072
  special_tokens_file: 20B-G/tokenizer/latex-v0.3/special_tokens.json
  artifact_dir: 20B-G/tokenizer/latex-v0.3

init:
  scheme: mup
  base_width: 2048
  base_depth: 24
  std: 0.02

checkpoint:
  format: safetensors
  save_every_steps: 250
  output_dir: 20B-G/checkpoints/latex-2b-sft

training:
  enabled: true
  precision: bf16
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.05
  lr: 1.0e-4
  schedule: wsd
  warmup_ratio: 0.05
  grad_clip: 1.0
  gradient_checkpointing: true
  seq_len: 1024
  micro_batch_size: 4
  grad_accum_steps: 8
  tokens_target: 8_192_000
  log_every: 10
  identity_upsample: 2
  mantra_mix: 0.05
  soft_identity_mix: 0.05
  identity_loss_weight: 1.0
  mantra_loss_weight: 1.3
  corpus_manifest: 20B-G/datasets/manifests/sft_agent_code_v03.json
  resume_from: 20B-G/checkpoints/latex-2b-iter5

hardware:
  provider: runpod
  accelerator: cuda
  gpu: RTX_PRO_6000
  cluster:
    nodes: 1
    gpus: 1

# Preference / DPO runs after this ckpt — see configs/stage0_2b_dpo_stub.yaml
dpo:
  enabled: false
  note: stub only — implement after SFT loss plateaus
