# Gate A PROXY — licensed HF samples + identity (NOT full 10GB corpus-v0.2 yet).
# No FineWeb backbone. Scale max_docs when disk/time allow → toward real Gate A.
name: latex-gate-a-proxy-v0
version: "0.2-proxy"

output_dir: datasets/raw/shards/hf_gate_a
manifest: datasets/manifests/corpus_gate_a_proxy.json

defaults:
  max_docs_per_source: 20000
  max_chars_per_doc: 10000
  seed: 42

sources:
  - id: pes2o
    hub: allenai/peS2o
    revision: refs/convert/parquet
    split: train
    streaming: true
    text_field: text
    bucket: scientific
    max_docs: 15000

  - id: pleias_open
    hub: PleIAs/common_corpus
    split: train
    streaming: true
    text_field: text
    bucket: scientific
    max_docs: 12000
    filter_open_type:
      - Open Science
      - Open Culture
      - Open Source

  - id: wiki_en
    hub: wikimedia/wikipedia
    config: 20231101.en
    split: train
    streaming: true
    text_field: text
    bucket: multilingual
    max_docs: 25000

  - id: wiki_ru
    hub: wikimedia/wikipedia
    config: 20231101.ru
    split: train
    streaming: true
    text_field: text
    bucket: multilingual
    max_docs: 20000

  - id: pg19
    hub: emozilla/pg19
    split: train
    streaming: true
    text_field: text
    bucket: multilingual
    max_docs: 400
    max_chars_per_doc: 16000

  - id: mbpp
    hub: google-research-datasets/mbpp
    split: train
    streaming: false
    text_field: code
    text_prefix_field: text
    bucket: code
    max_docs: 974

# After Accept on Hub, add the-stack-smol / starcoderdata here.

local_identity:
  enabled: true
  manifest: datasets/manifests/pretrain_stage0.json
