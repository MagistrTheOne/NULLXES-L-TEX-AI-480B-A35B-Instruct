# NULLXES-LÆTEX AI 200B-A28B — intermediate MoE (2026).
#
# Same width as 20B dense / A35B (d_model=8192). Depth matches A35B (L=48).
# Param account (scripts/param_count.py): ~202.2B total / ~28.0B active.
#
# Schedule: after 20B dense V1 proves the stack; before 480B-A35B expand.
# MoE code path is reference until dense ≥50B / 20B V1 gates pass.
# Hardware: B300 preferred; H200 cluster with high EP/PP acceptable.
stage: latex_200b_moe_reference
model:
  name: nullxes-latex-200b-a28b
  architecture: nhat_moe
  role: moe_midscale
  n_layers: 48
  d_model: 8192
  n_heads: 64
  n_kv_heads: 8
  d_head: 128
  d_ff_dense: 22016
  d_ff_expert: 2176
  vocab_size: 131072
  max_seq_len_train: 16384
  max_seq_len_infer: 65536
  train_context: 16384
  infer_context: 65536
  max_seq_len: 16384
  rope_theta: 1000000.0
  rope_scaling:
    enabled: true
    target_context: 65536
  norm: rmsnorm
  activation: swiglu
  attention: gqa
  flash_attention: sdpa_auto
  hybrid_attention:
    enabled: true
    local_window: 4096
    full_every: 4
    local_rope: true
    global_nope: true
    pattern:
      local_layers: 3
      global_layer: 1
  depth_nope_ratio: 0.25
  dense_prefix_layers: 4
  tie_embeddings: false
  qk_norm: true
  z_loss_coeff: 1.0e-5
  no_bias: true

tokenizer:
  name: nullxes-latex-v1
  vocab_size: 131072
  special_tokens_file: tokenizer/latex-v1/special_tokens.json
  artifact_dir: tokenizer/latex-v1

moe:
  n_routed_experts: 80
  n_shared_experts: 1
  top_k: 6
  router: nx_sigmoid_normalize
  router_dtype: fp32
  capacity_factor: 1.25
  load_balance: aux_loss_free_bias
  aux_loss_coeff_warmup: 0.01
  aux_loss_warmup_steps: 5000
  expert_diversity_loss: true
  diversity_coeff: 1.0e-4
  expert_banks_posthoc_example:
    reasoning: [0, 11]
    coding: [12, 23]
    enterprise: [24, 35]
    science: [36, 47]
    multilingual: [48, 59]
    agent_tools: [60, 71]
    memory_workflow: [72, 79]

identity_embedding_layer:
  enabled: false
  n_identities: 64
  inject: layer0
  freeze_trunk_when_swapping: true

init:
  scheme: expand_from_dense_or_mup
  # Prefer warm-start from A35B dense (same L/d) when available; else muP cold.
  dense_checkpoint: null
  expert_noise: orthogonal
  noise_scale_start: 0.02
  noise_scale_end: 0.005
  noise_schedule: cosine
  shared_expert_noise: false
  router_std: 0.01
  expert_bias_init: 0.0
  residual_scale:
    type: deepnorm
    value: "0.02 / sqrt(2*n_layers)"
  expert_taxonomy: posthoc_clustering_only

checkpoint:
  format: safetensors
  save_every_steps: 500
  output_dir: checkpoints/nullxes-latex-200b-a28b

training:
  enabled: false
  precision: fp8
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  lr: 5.0e-5
  schedule: wsd
  warmup_ratio: 0.015
  grad_clip: 1.0
  global_batch_tokens: 4194304
  tokens_target: 800_000_000_000
  stop_on_expert_collapse: true

alignment:
  pipeline: [sft, dpo]
  protocol: input_analysis_answer

hardware:
  provider: generic
  accelerator: cuda
  gpu: B300
  cluster:
    nodes: 8
    gpus: 64
  fallback:
    gpu: H200_SXM
    gpus: 128
  parallelism:
    tp: 4
    pp: 4
    ep: 8
    cp: 1
    dp: auto
  backend:
    distributed: nccl
