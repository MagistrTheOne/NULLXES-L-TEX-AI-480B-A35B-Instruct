# NULLXES-LÆTEX Stage1 — Weight Genesis (dense ~6.7B)
# NOT "training start" — birth + diagnose weights first, then tokens.
# Training (180B tokens) only after init_report.json passes.
stage: weight_genesis
model:
  name: nullxes-latex-7b
  architecture: nhat_dense
  n_layers: 32
  d_model: 4096
  n_heads: 32
  n_kv_heads: 8
  d_head: 128
  d_ff: 11008
  vocab_size: 131072
  max_seq_len: 8192
  rope_theta: 500000.0
  rope_scaling:
    enabled: true
    target_context: 32768
  norm: rmsnorm
  activation: swiglu
  attention: gqa
  hybrid_attention:
    enabled: true
    local_window: 4096
    full_every: 4
    local_rope: true
    global_nope: true
    pattern:
      local_layers: 3
      global_layer: 1
  depth_nope_ratio: 0.25
  tie_embeddings: false
  qk_norm: true
  z_loss_coeff: 1.0e-5
  no_bias: true

tokenizer:
  name: nullxes-latex-v0.1
  vocab_size: 131072
  special_tokens_file: tokenizer/latex-v0.1/special_tokens.json
  artifact_dir: tokenizer/latex-v0.1

init:
  scheme: mup
  base_width: 2048
  base_depth: 32
  std: 0.02
  residual_scale:
    type: deepnorm
    value: "0.02 / sqrt(2*n_layers)"
  inherit_from: null

checkpoint:
  format: safetensors
  save_every_steps: 1000
  output_dir: checkpoints/nullxes-latex-7b

training:
  enabled: false  # Weight Genesis first
  precision: bf16
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  lr: 1.5e-4
  schedule: wsd
  warmup_ratio: 0.02
  grad_clip: 1.0
  global_batch_tokens: 2097152
  tokens_target: 180_000_000_000

hardware:
  provider: generic
  accelerator: cuda
  gpu: H200
  cluster:
    nodes: 1
    gpus: 8
  parallelism:
    tp: 2
    pp: 1
    dp: 4
  backend:
    distributed: nccl
