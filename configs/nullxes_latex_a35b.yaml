# NULLXES-LÆTEX A35B — dense genetic ancestor (~35.3B)
# Weight Genesis / pretrain after Stage1; MoE expand parent for 480B.
stage: a35b
model:
  name: nullxes-latex-a35b
  architecture: nhat_dense
  role: init_backbone
  n_layers: 48
  d_model: 8192
  n_heads: 64
  n_kv_heads: 8
  d_head: 128
  d_ff: 22016
  vocab_size: 131072
  max_seq_len: 32768
  rope_theta: 1000000.0
  rope_scaling:
    enabled: true
    target_context: 131072
  norm: rmsnorm
  activation: swiglu
  attention: gqa
  hybrid_attention:
    enabled: true
    local_window: 4096
    full_every: 4
    local_rope: true
    global_nope: true
    pattern:
      local_layers: 3
      global_layer: 1
  depth_nope_ratio: 0.25
  tie_embeddings: false
  qk_norm: true
  z_loss_coeff: 1.0e-5
  no_bias: true

tokenizer:
  name: nullxes-latex-v0.1
  vocab_size: 131072
  special_tokens_file: tokenizer/latex-v0.1/special_tokens.json
  artifact_dir: tokenizer/latex-v0.1

identity_embedding_layer:
  enabled: true
  n_identities: 64
  inject: layer0
  freeze_trunk_when_swapping: true
  characters:
    - anna
    - adeline
    - karen
    - hr_agent
    - sales_agent
    - support_agent

init:
  scheme: mup
  base_width: 2048
  base_depth: 32
  std: 0.02
  residual_scale:
    type: deepnorm
    value: "0.02 / sqrt(2*n_layers)"
  inherit_from: configs/nullxes_latex_7b.yaml

checkpoint:
  format: safetensors
  save_every_steps: 1000
  output_dir: checkpoints/nullxes-latex-a35b

training:
  enabled: false
  precision: fp8
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  lr: 8.0e-5
  schedule: wsd
  warmup_ratio: 0.015
  grad_clip: 1.0
  global_batch_tokens: 4194304
  tokens_target: 500_000_000_000

hardware:
  provider: generic
  accelerator: cuda
  gpu: B300
  cluster:
    nodes: 8
    gpus: 64
  parallelism:
    tp: 4
    pp: 4
    dp: 4
    cp: 1
  backend:
    distributed: nccl
