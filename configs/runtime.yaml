# Cloud-agnostic runtime — H200 / B300 cluster (2026).
# Provider lives here / CLI only, never in model code.

compute:
  accelerator: cuda
  devices: auto
  memory_policy:
    cpu_offload: false
    init_device: cpu
    train_device: cuda
  workers:
    auto: true
    dataloader_num_workers: 8

storage:
  dataset_path: datasets
  streaming: true
  mmap: true
  processed_path: datasets/processed
  tokenizer_out: tokenizer/latex-v1
  checkpoint_root: checkpoints

precision:
  tokenizer: fp32
  train: bf16
  init: float32

provider_hints:
  default: runpod
  preferred_gpu: H200_SXM
  production_gpu: B300
  image_hint: runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04
  torch_hint: "2.4.1+cu124"
