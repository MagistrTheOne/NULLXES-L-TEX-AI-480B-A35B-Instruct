# Cloud-agnostic runtime — provider lives here / CLI only, never in model code.

compute:
  accelerator: cuda
  devices: auto
  memory_policy:
    cpu_offload: true
  workers:
    auto: true

storage:
  dataset_path: /workspace/datasets
  streaming: true
  mmap: true
  processed_path: /workspace/datasets/processed
  tokenizer_out: tokenizer/latex-v0.1
  checkpoint_root: checkpoints

precision:
  tokenizer: fp32

# Optional overlay (not imported by latex_tokenizer / latex models)
provider_hints:
  # Active Stage0 proxy pod — see configs/runtime_runpod_rtx_pro_6000.yaml
  default: runpod
  active_runtime: configs/runtime_runpod_rtx_pro_6000.yaml
  image: runpod/pytorch:1.0.2-cu1281-torch280-ubuntu2404
  torch: "2.8.0+cu128"
  gpu: RTX_PRO_6000
