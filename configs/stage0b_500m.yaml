# NULLXES-LÆTEX Stage 0b — research dense (~530M)
stage: stage0b
model:
  name: nullxes-latex-stage0b-500m
  architecture: nhat_dense
  n_layers: 24
  d_model: 1024
  n_heads: 16
  n_kv_heads: 4
  d_head: 64
  d_ff: 2816
  vocab_size: 131072
  max_seq_len: 4096
  rope_theta: 50000.0
  rope_scaling:
    enabled: true
    target_context: 16384
  norm: rmsnorm
  activation: swiglu
  attention: gqa
  hybrid_attention:
    enabled: true
    local_window: 4096
    full_every: 4
    local_rope: true
    global_nope: true
    pattern:
      local_layers: 3
      global_layer: 1
  depth_nope_ratio: 0.25
  tie_embeddings: false
  qk_norm: true
  z_loss_coeff: 1.0e-5
  no_bias: true

tokenizer:
  name: nullxes-latex-v0.1
  vocab_size: 131072
  special_tokens_file: tokenizer/latex-v0.1/special_tokens.json
  artifact_dir: tokenizer/latex-v0.1

init:
  scheme: mup
  base_width: 512
  base_depth: 12
  std: 0.02
  residual_scale:
    type: deepnorm
    value: "0.02 / sqrt(2*n_layers)"

checkpoint:
  format: safetensors
  save_every_steps: 500
  output_dir: checkpoints/nullxes-latex-stage0b-500m

training:
  enabled: false
  precision: bf16
  optimizer: adamw
  lr: 4.0e-4
  schedule: wsd
  warmup_ratio: 0.02
  grad_clip: 1.0
  global_batch_tokens: 262144
  tokens_target: 40_000_000_000

hardware:
  provider: generic
  accelerator: cuda
  gpu: H200
  cluster:
    nodes: 1
    gpus: 4
  parallelism:
    tp: 1
    pp: 1
    dp: 4
  backend:
    distributed: nccl
