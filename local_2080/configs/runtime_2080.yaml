# Local Win11 / RTX 2080 SUPER — paths relative to repo root via trainer
compute:
  accelerator: cuda
  devices: auto
  memory_policy:
    cpu_offload: true
  workers:
    auto: true

storage:
  dataset_path: datasets
  streaming: true
  mmap: true
  processed_path: datasets/processed
  tokenizer_out: tokenizer/latex-v0.1
  checkpoint_root: checkpoints/local_2080

precision:
  tokenizer: fp32

provider_hints:
  default: local_2080
